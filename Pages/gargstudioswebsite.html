<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Garg Studios Website </title>
    <link rel="stylesheet" href="../Static/Style/style.css">
    <link rel="icon" href="../Static/Assets/Images/favicon.png">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js" async></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js" async></script>
    <script src="../Static/JS/main.js"></script>
</head>
<body>
  <header>
    <a href="../index.html"><ion-icon name="home" class="houseionicon"></ion-icon></a>
    <section>
      <h1 class="title bigtext containsimg">Garg Studios Website&nbsp;<img src="../Static/Assets/Images/favicon.png" alt="gargStudios" class="gargStudiosLogo"></h1>
      <p class="headinginfo mediumtext">Information</p>
    </section>
  </header>
  <main>
    <section class="masterprojectcontainer">
      <article class="projectcontainer">
        <div class="project">
          <h3 class="projectname">URL</h3>
          <div class="centered containsimg">
            <button onclick="copyText('')" class="containsimg urlcontainer"><code id="toCopy" class="url">https://garg-studios.github.io</code>&nbsp;<ion-icon name="copy-outline" class="copysymbol"></ion-icon></button>
          </div>
        </div>
      </article>
      <a href="https://github.com/Garg-Studios/garg-studios.github.io" target="_blank" class="notextdecoration">
        <article class="projectcontainer">
          <div class="project">
            <h3 class="projectname githubrepolink">GitHub Repository&nbsp;<ion-icon name="logo-github"></ion-icon>
            </h3>
            <p class="projectinfo">This is the GitHub Repo behind this website. Lots of the code is very messy, so any help would be appreciated.</p>
          </div>
        </article>
      </a>
      <a href="privacy.html" class="notextdecoration">
        <article class="projectcontainer">
          <div class="project">
            <h3 class="projectname">Privacy Policy</h3>
            <p class="projectinfo">This is the Privacy Policy behind this website.</p>
          </div>
        </article>
      </a>
    </section>
  </main>
  <footer>
    <br>
    <br>
    <br>

  </footer>
